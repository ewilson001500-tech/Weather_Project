<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="weather-search-input"
          />
          <input type="submit" class="weather-search-submit" />
        </form>
      </header>
      <main>
        <div class="current-weather-data">
          <div>
            <h1 class="current-city">Houston</h1>
            <p class="current-details">
              Thursday 14:49, cloudy
              <br />
              Humidity: <strong>66%</strong>, Wind: <strong>3.12km/h</strong>
            </p>
          </div>
          <div>
            <span class="weather-icon">🌥️</span>
            <span class="weather-value">85</span
            ><span class="weather-unit">°F</span>
          </div>
        </div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/ewilson001500-tech" target="_blank"
          >Erin Wilson</a
        >
        open-sourced on
        <a
          href="https://github.com/ewilson001500-tech/Weather_Project"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a href="https://weather-app-ew.netlify.app/" target="_blank"
          >Netlify.</a
        >
      </footer>
    </div>
  </body>
</html>

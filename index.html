<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>Weather</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form class="search-form" id="search-form">
          <input
            type="search"
            placeholder="Enter a city..."
            required
            class="weather-search-input"
            id="weather-search-input"
          />
          <input
            type="submit"
            class="weather-search-submit"
            id="weather-search-submit"
          />
        </form>
      </header>
      <main>
        <div class="current-weather-data">
          <div>
            <h1 class="current-city"></h1>
            <p class="current-details">
              <span id="time"></span>, <span id="description"></span>
              <br />
              Humidity: <strong id="humidity"></strong>, Wind:
              <strong id="wind"></strong>
            </p>
          </div>
          <div>
            <span class="weather-icon" id="weather-icon"></span>
            <span class="weather-value" id="weather-value"></span
            ><span class="weather-unit">°F</span>
          </div>
        </div>

        <div class="weather-forecast">
          <div class="weather-forecast-day">
            <div class="forecast-day">Mon</div>
            <div class="forecast-icon">🌥️</div>
            <div class="forecast-temperatures">
              <div class="forecast-temp"><strong>90°</strong></div>
              <div class="forecast-temp">85°</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="forecast-day">Tue</div>
            <div class="forecast-icon">🌥️</div>
            <div class="forecast-temperatures">
              <div class="forecast-temp"><strong>90°</strong></div>
              <div class="forecast-temp">85°</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="forecast-day">Wed</div>
            <div class="forecast-icon">🌥️</div>
            <div class="forecast-temperatures">
              <div class="forecast-temp"><strong>90°</strong></div>
              <div class="forecast-temp">85°</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="forecast-day">Thu</div>
            <div class="forecast-icon">🌥️</div>
            <div class="forecast-temperatures">
              <div class="forecast-temp"><strong>90°</strong></div>
              <div class="forecast-temp">85°</div>
            </div>
          </div>
          <div class="weather-forecast-day">
            <div class="forecast-day">Fri</div>
            <div class="forecast-icon">🌥️</div>
           <div class="forecast-temperatures">
              <div class="forecast-temp"><strong>90°</strong></div>
              <div class="forecast-temp">85°</div>
            </div>
          </div>
        </div>
      </main>
      <footer>
        Coded by
        <a href="https://github.com/ewilson001500-tech" target="_blank"
          >Erin Wilson</a
        >
        open-sourced on
        <a
          href="https://github.com/ewilson001500-tech/Weather_Project"
          target="_blank"
          >GitHub</a
        >
        and hosted on
        <a href="https://weather-app-ew.netlify.app/" target="_blank"
          >Netlify.</a
        >
      </footer>
    </div>
    <script src="src/index.js"></script>
  </body>
</html>
